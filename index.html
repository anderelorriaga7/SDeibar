<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Equipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --pitch-dark:#132D24;
    --pitch-mid:#2E6F4E;
    --pitch-light:#3F8F62;
    --card-bg:#1B3B30;
    --card-bg-2:#20463A;
    --line:#DCE6DA;
    --line-dim:#7E9C8E;
    --gold:#D6A93B;
    --yellow:#EFC94C;
    --red:#C8362A;
    --green-ok:#4C9A6A;
    --text:#F1F5EE;
    --text-dim:#9FB6AB;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--pitch-dark);}
  body{
    font-family:'Inter',sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  #app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--pitch-dark);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  ::-webkit-scrollbar{display:none;}

  /* ---- Responsive: tablet y escritorio ---- */
  @media (min-width: 700px){
    body{ padding:24px 0; }
    #app{
      max-width:640px;
      min-height:calc(100vh - 48px);
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.45);
      overflow:hidden;
    }
    nav{ max-width:640px; border-radius:0 0 20px 20px; position:sticky; bottom:0; }
    main{ padding-bottom:24px; }
    .fab{ right:calc(50% - 296px); }
  }
  @media (min-width: 1000px){
    #app{ max-width:920px; }
    nav{ max-width:920px; }
    .fab{ right:calc(50% - 436px); }
    main{ padding:20px 32px 24px; }
    .player-card, .match-card, .injury-row, .player-media-card{ }
    #main{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:0 24px;
      align-content:start;
    }
    #main > h2.section-title, #main > .empty-state, #main > table, #main > .stat-grid, #main > .bucket-legend, #main > .new-match-btn, #main > .add-media-btn, #main > .add-event-btn, #main > .back-row, #main > .ficha, #main > .pitch-wrap, #main > .subtabs, #main > .share-row, #main > .share-note, #main > .formation-row, #main > p{
      grid-column: 1 / -1;
    }
  }
  @media (min-width: 1000px) and (hover:hover){
    .player-card:hover, .match-card:hover, .player-media-card:hover{ background:var(--card-bg-2); }
  }

  /* ---- Login ---- */
  .login-overlay{
    position:fixed; inset:0; background:var(--pitch-dark); display:none;
    align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .login-overlay.open{ display:flex; }
  .login-box{
    width:100%; max-width:340px; background:var(--card-bg-2); border-radius:20px; padding:28px 24px;
    border:1px solid rgba(220,230,218,0.08);
  }
  .login-box h1{
    font-family:'Oswald',sans-serif; font-size:22px; text-transform:uppercase; letter-spacing:0.5px; margin:0 0 4px; text-align:center;
  }
  .login-box .login-sub{ font-size:12.5px; color:var(--text-dim); text-align:center; margin:0 0 22px; }
  .login-error{ color:var(--red); font-size:12.5px; text-align:center; margin:-6px 0 14px; min-height:14px; }
  .login-loading{ text-align:center; color:var(--text-dim); font-size:13px; padding:60px 20px; }

  /* Header */
  header{
    padding:18px 18px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    background:linear-gradient(180deg, var(--card-bg) 0%, var(--pitch-dark) 100%);
    border-bottom:1px solid rgba(220,230,218,0.08);
  }
  .crest{ width:42px;height:46px;flex-shrink:0; position:relative; }
  .crest svg{width:100%;height:100%;}
  .team-name-wrap{flex:1; min-width:0;}
  #teamName{
    font-family:'Oswald',sans-serif;
    font-size:22px;
    font-weight:600;
    letter-spacing:0.5px;
    text-transform:uppercase;
    background:transparent;
    border:none;
    color:var(--text);
    width:100%;
    padding:0;
    outline:none;
  }
  .subtitle{font-size:11px; color:var(--text-dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; display:flex; align-items:center; gap:6px;}
  .mode-badge{
    display:inline-flex; align-items:center; gap:4px;
    padding:2px 7px; border-radius:20px; font-size:9.5px; letter-spacing:0.5px;
    background:rgba(220,230,218,0.08); color:var(--text-dim);
  }
  .mode-badge.editor{background:rgba(214,169,59,0.18); color:var(--gold);}
  .lock-btn{
    background:none; border:none; color:var(--text-dim); cursor:pointer;
    width:36px; height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .lock-btn.editor{color:var(--gold);}
  .lock-btn svg{width:19px;height:19px;}

  /* Main */
  main{flex:1; padding:16px 16px 90px; overflow-y:auto;}

  h2.section-title{
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin:22px 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  h2.section-title:first-child{margin-top:4px;}
  h2.section-title::after{content:''; flex:1; height:1px; background:rgba(220,230,218,0.12);}

  /* Player rows */
  .player-card{
    background:var(--card-bg);
    border-radius:14px;
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:8px;
    border:1px solid rgba(220,230,218,0.06);
  }
  .num-badge{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:16px;
    width:36px;height:36px;
    border-radius:9px;
    background:var(--pitch-mid);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .player-info{flex:1; min-width:0;}
  .player-name{font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .player-pos{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-top:1px;}
  .icon-btn{
    background:none; border:none; color:var(--text-dim);
    font-size:18px; cursor:pointer; padding:6px; line-height:1;
  }
  .icon-btn:active{color:var(--red);}

  .empty-state{ text-align:center; padding:36px 20px; color:var(--text-dim); }
  .empty-state .big{font-size:34px; margin-bottom:8px;}
  .empty-state p{font-size:13px; line-height:1.5; margin:4px 0 0;}

  /* Lock overlay styling for edit-only controls */
  .locked-view .edit-only{ pointer-events:none !important; opacity:0.4; filter:grayscale(0.4); }
  .locked-view #teamName{ pointer-events:none; }

  /* FAB */
  .fab{
    position:fixed;
    bottom:86px;
    right:16px;
    width:52px;height:52px;
    border-radius:50%;
    background:var(--gold);
    color:var(--pitch-dark);
    border:none;
    font-size:26px;
    font-weight:600;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.35);
    cursor:pointer;
    z-index:20;
  }

  /* Bottom nav */
  nav{
    position:fixed;
    bottom:0;
    width:100%;
    max-width:430px;
    background:var(--card-bg);
    border-top:1px solid rgba(220,230,218,0.08);
    display:flex;
    padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    z-index:15;
  }
  .nav-btn{
    flex:1; background:none; border:none; color:var(--text-dim);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-family:'Inter',sans-serif; font-size:10.5px; letter-spacing:0.5px; text-transform:uppercase;
    padding:6px 0; cursor:pointer;
  }
  .nav-btn svg{width:21px;height:21px;}
  .nav-btn.active{color:var(--gold);}
  .nav-btn.active svg{stroke:var(--gold);}

  /* Sub tabs (Datos) */
  .subtabs{ display:flex; gap:8px; margin-bottom:16px; }
  .subtab-btn{
    flex:1; padding:9px 0; border-radius:10px; border:1px solid rgba(220,230,218,0.14);
    background:transparent; color:var(--text-dim); font-size:11.5px; font-weight:600;
    letter-spacing:0.5px; text-transform:uppercase; cursor:pointer;
  }
  .subtab-btn.sel{ background:var(--pitch-mid); color:var(--text); border-color:var(--pitch-mid); }

  /* Modal */
  .modal-overlay{ position:fixed; inset:0; background:rgba(6,16,12,0.72); display:none; align-items:flex-end; justify-content:center; z-index:50; }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card-bg-2); width:100%; max-width:430px; border-radius:20px 20px 0 0;
    padding:20px 20px calc(20px + env(safe-area-inset-bottom)); max-height:85vh; overflow-y:auto;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  .modal h3{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:1px; font-size:18px; margin:0 0 4px; }
  .modal .modal-sub{ font-size:12px; color:var(--text-dim); margin:0 0 16px; line-height:1.5; }
  .field{margin-bottom:14px;}
  .field label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:6px;}
  .field input, .field select{
    width:100%; background:var(--pitch-dark); border:1px solid rgba(220,230,218,0.15); border-radius:10px;
    padding:11px 12px; color:var(--text); font-size:15px; font-family:'Inter',sans-serif;
  }
  .field input:focus, .field select:focus{outline:1px solid var(--gold);}
  .checkbox-field{ display:flex; align-items:center; gap:10px; margin-bottom:14px; cursor:pointer; }
  .checkbox-field .box{
    width:22px;height:22px;border-radius:6px;border:2px solid var(--line-dim);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:900;color:var(--pitch-dark);
  }
  .checkbox-field .box.on{ background:var(--gold); border-color:var(--gold); }
  .checkbox-field span{font-size:13px;}
  .pos-choice{display:flex; gap:8px; flex-wrap:wrap;}
  .pos-choice button{
    flex:1; min-width:60px; padding:10px 4px; border-radius:10px; border:1px solid rgba(220,230,218,0.15);
    background:var(--pitch-dark); color:var(--text-dim); font-size:12px; font-weight:600; letter-spacing:0.5px; cursor:pointer;
  }
  .pos-choice button.sel{ background:var(--pitch-mid); color:var(--text); border-color:var(--pitch-mid); }
  .modal-actions{display:flex; gap:10px; margin-top:18px;}
  .btn{ flex:1; padding:13px 0; border-radius:12px; border:none; font-family:'Inter',sans-serif; font-weight:600; font-size:14px; cursor:pointer; }
  .btn-primary{background:var(--gold); color:var(--pitch-dark);}
  .btn-ghost{background:transparent; color:var(--text-dim); border:1px solid rgba(220,230,218,0.15);}
  .btn-danger{background:transparent; color:var(--red); border:1px solid rgba(200,54,42,0.4);}
  .pin-dots{ display:flex; gap:12px; justify-content:center; margin:6px 0 18px; }
  .pin-dots input{
    width:46px; height:52px; text-align:center; font-size:22px; font-family:'JetBrains Mono',monospace;
    background:var(--pitch-dark); border:1px solid rgba(220,230,218,0.2); border-radius:10px; color:var(--text);
  }
  .pin-error{ color:var(--red); font-size:12px; text-align:center; margin:-8px 0 12px; min-height:14px; }

  /* Convocatoria */
  .match-card{
    background:var(--card-bg); border-radius:14px; padding:14px; margin-bottom:10px;
    border:1px solid rgba(220,230,218,0.06); cursor:pointer; display:flex; align-items:center; gap:12px;
  }
  .match-card .info{flex:1; min-width:0;}
  .match-card .vs{font-family:'Oswald',sans-serif; font-size:16px; text-transform:uppercase; letter-spacing:0.5px;}
  .match-card .date{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .match-card .count{font-size:11px; color:var(--gold); margin-top:6px; font-weight:600;}
  .score-badge{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:18px;
    background:var(--pitch-dark); border-radius:10px; padding:6px 10px; flex-shrink:0; min-width:52px; text-align:center;
  }
  .result-tag{
    font-size:10px; font-weight:800; border-radius:6px; padding:2px 6px; margin-left:6px; letter-spacing:0.5px;
  }
  .result-tag.W{background:rgba(76,154,106,0.2); color:var(--green-ok);}
  .result-tag.D{background:rgba(159,182,171,0.2); color:var(--text-dim);}
  .result-tag.L{background:rgba(200,54,42,0.2); color:var(--red);}

  .new-match-btn{
    width:100%; padding:13px; border-radius:14px; border:1px dashed rgba(220,230,218,0.3);
    background:transparent; color:var(--text-dim); font-size:13px; font-weight:600; letter-spacing:0.5px;
    text-transform:uppercase; cursor:pointer; margin-bottom:16px;
  }

  .back-row{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .back-row button{background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; padding:2px 6px 2px 0;}
  .back-row .vs-title{font-family:'Oswald',sans-serif; font-size:19px; text-transform:uppercase;}
  .back-row .date-sub{font-size:11px; color:var(--text-dim);}

  .ficha{
    background:var(--card-bg); border-radius:14px; padding:16px; margin-bottom:18px;
    display:flex; align-items:center; justify-content:space-between; border:1px solid rgba(220,230,218,0.08);
  }
  .ficha .score{font-family:'Oswald',sans-serif; font-size:32px; letter-spacing:1px;}
  .ficha .mini-stats{ display:flex; gap:14px; }
  .ficha .mini-stat{ text-align:center; }
  .ficha .mini-stat .v{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px;}
  .ficha .mini-stat .l{font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px;}

  .check-row{
    display:flex; align-items:center; gap:12px;
    background:var(--card-bg); border-radius:12px; padding:11px 14px; margin-bottom:7px;
  }
  .checkbox{
    width:20px;height:20px;border-radius:6px; border:2px solid var(--line-dim);
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }
  .checkbox.on{background:var(--gold); border-color:var(--gold); color:var(--pitch-dark); font-size:13px; font-weight:900;}

  /* Pitch */
  .pitch-wrap{
    background:linear-gradient(180deg, var(--pitch-light) 0%, var(--pitch-mid) 100%);
    border-radius:16px; position:relative; padding:14px 8px; margin-bottom:14px; overflow:hidden;
    border:2px solid rgba(220,230,218,0.25);
  }
  .pitch-svg{position:absolute; inset:0; width:100%; height:100%;}
  .pitch-band{ position:relative; display:flex; justify-content:space-evenly; align-items:center; min-height:74px; z-index:2; }
  .chip{ display:flex; flex-direction:column; align-items:center; gap:3px; width:52px; }
  .chip .dot{
    width:34px;height:34px;border-radius:50%; background:var(--card-bg); border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--text);
  }
  .chip .cname{font-size:9.5px; text-align:center; color:var(--text); font-weight:600; line-height:1.1;
    text-shadow:0 1px 2px rgba(0,0,0,0.5); max-width:52px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .titular-toggle{
    width:22px;height:22px;border-radius:6px; border:2px solid var(--line-dim); flex-shrink:0;
    display:flex;align-items:center;justify-content:center; font-size:11px;font-weight:900;color:var(--pitch-dark);
  }
  .titular-toggle.on{background:var(--gold); border-color:var(--gold);}

  /* Events */
  .event-row{
    display:flex; align-items:center; gap:10px;
    background:var(--card-bg); border-radius:12px; padding:10px 12px; margin-bottom:7px;
  }
  .event-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .event-icon.goal{background:var(--gold); color:var(--pitch-dark);}
  .event-icon.against{background:var(--red); color:var(--text);}
  .event-icon.assist{background:var(--pitch-mid); color:var(--text);}
  .event-icon.yellow{background:var(--yellow); color:var(--pitch-dark); border-radius:5px; width:20px; height:26px;}
  .event-icon.red{background:var(--red); color:var(--text); border-radius:5px; width:20px; height:26px;}
  .event-txt{flex:1; font-size:13px;}
  .event-txt b{font-weight:700;}
  .event-min{font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace;}

  .add-event-btn{
    width:100%; padding:12px; border-radius:12px; border:1px dashed rgba(220,230,218,0.3);
    background:transparent; color:var(--gold); font-weight:600; font-size:13px; letter-spacing:0.5px;
    text-transform:uppercase; cursor:pointer; margin-top:6px;
  }

  /* Stats table */
  .stats-table{width:100%; border-collapse:collapse;}
  .stats-table th{
    font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim);
    text-align:center; padding:8px 4px; font-weight:600;
  }
  .stats-table th:first-child{text-align:left;}
  .stats-table td{
    padding:10px 4px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:13px;
    border-top:1px solid rgba(220,230,218,0.08);
  }
  .stats-table td:first-child{ text-align:left; font-family:'Inter',sans-serif; font-weight:600; font-size:13px; }
  .rank-badge{
    display:inline-flex; align-items:center; justify-content:center;
    width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;margin-right:6px;
    background:rgba(220,230,218,0.1); color:var(--text-dim);
  }
  .rank-badge.gold{background:var(--gold); color:var(--pitch-dark);}

  .stat-grid{ display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .stat-box{ flex:1; min-width:100px; background:var(--card-bg); border-radius:14px; padding:14px; }
  .stat-box .l{ font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
  .stat-box .v{ font-family:'Oswald',sans-serif; font-size:26px; margin-top:2px; }
  .stat-box .v.gold{ color:var(--gold); }
  .stat-box .v.red{ color:var(--red); }

  .bucket-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .bucket-label{ width:56px; font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .bucket-bars{ flex:1; display:flex; flex-direction:column; gap:3px; }
  .bucket-bar-track{ background:rgba(220,230,218,0.08); border-radius:5px; height:14px; position:relative; overflow:hidden; }
  .bucket-bar-fill{ height:100%; border-radius:5px; }
  .bucket-bar-fill.favor{ background:var(--gold); }
  .bucket-bar-fill.contra{ background:var(--red); }
  .bucket-count{ width:20px; font-size:11px; font-family:'JetBrains Mono',monospace; text-align:right; flex-shrink:0; }
  .bucket-legend{ display:flex; gap:14px; margin-bottom:12px; font-size:11px; color:var(--text-dim); }
  .bucket-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend-dot{ width:9px; height:9px; border-radius:3px; display:inline-block; }
  .legend-dot.favor{background:var(--gold);}
  .legend-dot.contra{background:var(--red);}

  .rival-row{
    display:flex; align-items:center; justify-content:space-between; background:var(--card-bg);
    border-radius:12px; padding:11px 14px; margin-bottom:7px;
  }
  .rival-row .name{font-size:13px; font-weight:600;}
  .rival-row .sub{font-size:10.5px; color:var(--text-dim); margin-top:1px;}
  .rival-row .nums{ font-family:'JetBrains Mono',monospace; font-size:14px; text-align:right; }
  .rival-row .nums .bal{ font-size:10.5px; color:var(--text-dim); margin-top:1px; }

  .loading-msg{text-align:center; padding:50px 20px; color:var(--text-dim); font-size:13px;}

  /* Crest */
  .crest{
    width:42px;height:46px;flex-shrink:0; position:relative; border:none; background:none; padding:0; cursor:default;
  }
  .crest.edit-only{ cursor:pointer; }
  #crestInner{ width:100%; height:100%; }
  #crestInner svg, #crestInner img{ width:100%; height:100%; }
  #crestInner img{ object-fit:cover; clip-path: path('M21 1 L39.2 8.4 V22.4 C39.2 35 30.8 42 21 44.8 C11.2 42 2.8 35 2.8 22.4 V8.4 Z'); }

  const SYMBOLS = {

  function crestSvg(color, symbol, teamName){
    let inner = SYMBOLS[symbol] || SYMBOLS.ball;

      const letter = (teamName||'M').trim().charAt(0).toUpperCase() || 'M';

    return `<svg viewBox="0 0 60 66" fill="none">
      <path d="M30 2 L56 12 V32 C56 50 44 60 30 64 C16 60 4 50 4 32 V12 Z" fill="${color}" stroke="#D6A93B" stroke-width="2.5"/>

    </svg>`;

  function readFileResized(file, maxSize, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          if(w>h){ if(w>maxSize){ h = Math.round(h*maxSize/w); w = maxSize; } }
          else{ if(h>maxSize){ w = Math.round(w*maxSize/h); h = maxSize; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function deletePlayer(id){
    if(!isEditor) return;
    state.players = state.players.filter(p=>p.id!==id);
    state.matches.forEach(m=>{
      m.calledUp = m.calledUp.filter(x=>x!==id);
      m.titulares = m.titulares.filter(x=>x!==id);
      m.events = m.events.filter(e=>e.playerId!==id);
      if(m.lineupSlots) m.lineupSlots = m.lineupSlots.map(pid=> pid===id ? null : pid);
      if(m.minutesPlayed) delete m.minutesPlayed[id];
    });
    delete mediaByPlayer[id];
    delete injuriesByPlayer[id];
    savePlayers(); saveMatches(); saveMedia(); saveInjuries();
    render();
  }

  /* ---------------- MATCH HELPERS ---------------- */
  function matchScore(m){
    const gf = m.events.filter(e=>e.type==='goal').length;
    const gc = m.events.filter(e=>e.type==='goal_against').length;
    return { gf, gc };
  }
  function matchResult(gf, gc){
    if(gf>gc) return 'W';
    if(gf<gc) return 'L';
    return 'D';
  }
  const RESULT_LABEL = {W:'V', D:'E', L:'D'};

  /* ---------------- CONVOCATORIA ---------------- */
  function renderConvocatoria(){
    if(currentMatchId){ renderMatchDetail(currentMatchId); return; }
    const sorted = [...state.matches].sort((a,b)=> b.date.localeCompare(a.date));
    let html = `<button class="new-match-btn edit-only" id="newMatchBtn">+ Nuevo partido</button>`;
    if(sorted.length===0){
      html += `<div class="empty-state"><div class="big">📋</div><p>${isEditor ? 'Crea un partido para armar la convocatoria y la alineación.' : 'Todavía no hay partidos registrados.'}</p></div>`;
    } else {
      html += sorted.map(m=>{
        const {gf,gc} = matchScore(m);
        const res = matchResult(gf,gc);
        return `<div class="match-card" data-open="${m.id}">
          ${rivalCrestHtml(m)}
          <div class="score-badge">${gf}-${gc}</div>
          <div class="info">
            <div class="vs">vs ${escapeHtml(m.opponent)} <span class="result-tag ${res}">${RESULT_LABEL[res]}</span></div>
            <div class="date">${formatDate(m.date)}</div>
            <div class="count">${m.calledUp.length} convocados · ${m.titulares.length}/11 titulares</div>
          </div>
        </div>`;
      }).join('');
    }
    main.innerHTML = html;
    const newBtn = $('#newMatchBtn');
    if(newBtn) newBtn.addEventListener('click', ()=>{ if(isEditor) openNewMatchModal(); });
    main.querySelectorAll('[data-open]').forEach(el=>{ el.addEventListener('click', ()=>{ currentMatchId = el.dataset.open; render(); }); });
  }

  function formatDate(d){
    if(!d) return '';
    const dt = new Date(d+'T00:00:00');
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString('es-ES', {weekday:'short', day:'numeric', month:'short'});
  }

      const date = $('#mDate').value || new Date().toISOString().slice(0,10);
      if(!opponent){ $('#mOpp').focus(); return; }
      const formation = DEFAULT_FORMATION;
      const match = {
        id: uid(), opponent, date, calledUp: [], titulares: [], events: [],
        opponentCrest: crestData, formation, lineupSlots: new Array(FORMATIONS[formation].slots.length).fill(null),
        minutesPlayed: {}
      };
      state.matches.push(match);
      saveMatches();
      closeModal();
      currentMatchId = match.id;
      render();
    });
  }

  function openEditRivalCrestModal(m){
    if(!isEditor) return;
    let crestData = m.opponentCrest || null;
    modalContent.innerHTML = `
      <h3>Escudo de ${escapeHtml(m.opponent)}</h3>
      <div class="rival-upload-row" id="rivalUploadRow">
        <div class="rival-crest" id="rivalCrestPreview">${crestData?`<img src="${crestData}"/>`:'🛡️'}</div>
        <div class="upl-txt">Toca para ${crestData?'cambiar':'subir'} el escudo</div>

      </div>

    $('#rivalUploadRow').addEventListener('click', ()=> $('#rivalCrestFile').click());

      try{

    $('#saveBtn').addEventListener('click', ()=>{

      saveMatches();
      closeModal();

  function renderMatchDetail(matchId){
    const m = state.matches.find(x=>x.id===matchId);
    if(!m){ currentMatchId=null; render(); return; }

    // Migración: partidos antiguos sin formación / minutos
    if(!m.formation || !m.lineupSlots){
      m.formation = DEFAULT_FORMATION;
      m.lineupSlots = new Array(FORMATIONS[DEFAULT_FORMATION].slots.length).fill(null);
      if(m.titulares && m.titulares.length){
        const slots = FORMATIONS[DEFAULT_FORMATION].slots;
        const remaining = [...m.titulares];
        slots.forEach((slot, idx)=>{
          if(remaining.length===0) return;
          const catOfSlot = SUBPOS_META[slot.code] ? SUBPOS_META[slot.code].category : null;
          let pick = remaining.find(pid=>{
            const pl = state.players.find(x=>x.id===pid);
            return pl && pl.positions && pl.positions.includes(slot.code);
          });
          if(!pick) pick = remaining.find(pid=>{
            const pl = state.players.find(x=>x.id===pid);
            return pl && primaryCategory(pl)===catOfSlot;
          });
          if(pick){ m.lineupSlots[idx] = pick; remaining.splice(remaining.indexOf(pick),1); }
        });
      }
    }
    if(!m.minutesPlayed) m.minutesPlayed = {};

    const {gf,gc} = matchScore(m);
    const res = matchResult(gf,gc);
    const yellows = m.events.filter(e=>e.type==='yellow').length;
    const reds = m.events.filter(e=>e.type==='red').length;

    if(state.players.length===0){
      main.innerHTML = `<div class="back-row"><button id="backBtn">←</button><div><div class="vs-title">vs ${escapeHtml(m.opponent)}</div></div></div>
      <div class="empty-state"><div class="big">⚽</div><p>Añade jugadores a la plantilla antes de convocar.</p></div>`;
      $('#backBtn').addEventListener('click', ()=>{ currentMatchId=null; render(); });
      return;
    }

    const called = state.players.filter(p=>m.calledUp.includes(p.id));
    const titulares = state.players.filter(p=>m.titulares.includes(p.id));

    let html = `
      <div class="back-row">
        <button id="backBtn">←</button>
        <div class="vs-title-row">
          ${rivalCrestHtml(m, true)}
          <div>
            <div class="vs-title">vs ${escapeHtml(m.opponent)} <button class="rival-edit-btn edit-only" id="editRivalCrestBtn">✎</button></div>
            <div class="date-sub">${formatDate(m.date)}</div>
          </div>
        </div>
        <button class="icon-btn edit-only" id="deleteMatchBtn" style="margin-left:auto;">🗑</button>
      </div>
      <div class="ficha">
        <div>
          <div class="score">${gf} - ${gc}</div>
          <span class="result-tag ${res}">${res==='W'?'Victoria':res==='D'?'Empate':'Derrota'}</span>
        </div>
        <div class="mini-stats">
          <div class="mini-stat"><div class="v">🟨 ${yellows}</div></div>
          <div class="mini-stat"><div class="v">🟥 ${reds}</div></div>
        </div>
      </div>
      <h2 class="section-title">Convocados (${called.length})</h2>
    `;
    html += state.players.map(p=>{
      const on = m.calledUp.includes(p.id);
      return `<div class="check-row edit-only" data-toggle-call="${p.id}">
        <div class="checkbox ${on?'on':''}">${on?'✓':''}</div>
        <div class="num-badge" style="width:28px;height:28px;font-size:12px;">${escapeHtml(p.number)}</div>
        <div class="player-info"><div class="player-name">${escapeHtml(p.name)}${injuryBadgeHtml(p.id)}</div><div class="player-pos">${positionsText(p)}</div></div>
      </div>`;
    }).join('');

    if(called.length>0){
      html += `<h2 class="section-title">Avisar a las convocadas</h2>
        <p class="share-note">La app no puede enviar notificaciones push al móvil de cada jugadora, pero puedes avisarlas al instante por WhatsApp o adjuntar un PDF con la convocatoria.</p>
        <div class="share-row edit-only">
          <a class="share-btn whatsapp" id="waShareBtn" target="_blank" rel="noopener">💬 WhatsApp</a>
          <button class="share-btn pdf" id="pdfBtn">📄 Descargar PDF</button>
        </div>`;
    }

    if(called.length>0){
      html += `<h2 class="section-title">Formación</h2>
        <div class="formation-row edit-only">
          ${Object.keys(FORMATIONS).map(k=>`<button class="formation-chip ${m.formation===k?'sel':''}" data-formation="${k}">${FORMATIONS[k].label}</button>`).join('')}
        </div>
        <h2 class="section-title">Alineación (${titulares.length}/11)</h2>`;
      html += buildFormationPitch(m, called);
      html += `<h2 class="section-title" style="margin-top:14px;">Colocar jugadoras</h2>`;
      html += FORMATIONS[m.formation].slots.map((slot, idx)=>{
        const sortedPlayers = playersForSlotSorted(slot, called);
        const currentId = m.lineupSlots[idx];
        return `<div class="slot-assign-row edit-only">
          <div class="slot-code-badge">${slot.code}</div>
          <select data-slot-idx="${idx}" ${isEditor?'':'disabled'}>
            <option value="">— Vacío —</option>
            ${sortedPlayers.map(p=>`<option value="${p.id}" ${currentId===p.id?'selected':''}>${escapeHtml(p.name)} (${escapeHtml(p.number)}) — ${p.positions.join('/')}</option>`).join('')}
          </select>
        </div>`;
      }).join('');

      html += `<h2 class="section-title">Minutos jugados</h2>`;
      html += called.map(p=>{
        const isT = m.titulares.includes(p.id);
        const stored = m.minutesPlayed[p.id];
        const val = (stored!=null) ? stored : '';
        return `<div class="minutes-row">
          <div class="num-badge" style="width:28px;height:28px;font-size:12px;">${escapeHtml(p.number)}</div>
          <div class="player-info"><div class="player-name">${escapeHtml(p.name)}</div><div class="player-pos">${isT?'Titular':'Suplente'}</div></div>
          <input class="minutes-input edit-only" type="number" min="0" max="130" placeholder="0" value="${val}" data-min-player="${p.id}" ${isEditor?'':'disabled'} />
          <span class="minutes-unit">min</span>
        </div>`;
      }).join('');
    }

    html += `<h2 class="section-title">Eventos del partido</h2>`;
    const sortedEv = [...m.events].sort((a,b)=> (a.minute||0)-(b.minute||0));
    if(sortedEv.length===0){
      html += `<div class="empty-state" style="padding:20px;"><p>Todavía no hay goles, asistencias o tarjetas registradas.</p></div>`;
    } else {
      const iconMap = {goal:{c:'goal',s:'⚽'}, goal_against:{c:'against',s:'🥅'}, assist:{c:'assist',s:'🅰'}, yellow:{c:'yellow',s:''}, red:{c:'red',s:''}};
      html += sortedEv.map(ev=>{
        const pl = ev.playerId ? state.players.find(x=>x.id===ev.playerId) : null;
        const ic = iconMap[ev.type];
        let label;
        if(ev.type==='goal') label = `Gol de <b>${escapeHtml(pl?pl.name:'—')}</b>${ev.setPiece?' <span style="color:var(--text-dim);">(balón parado)</span>':''}`;
        else if(ev.type==='goal_against') label = `Gol del rival${ev.setPiece?' <span style="color:var(--text-dim);">(balón parado)</span>':''}`;
        else if(ev.type==='assist') label = `Asistencia de <b>${escapeHtml(pl?pl.name:'—')}</b>`;
        else if(ev.type==='yellow') label = `Amarilla a <b>${escapeHtml(pl?pl.name:'—')}</b>`;
        else label = `Roja a <b>${escapeHtml(pl?pl.name:'—')}</b>`;
        return `<div class="event-row">
          <div class="event-icon ${ic.c}">${ic.s}</div>
          <div class="event-txt">${label}</div>
          <div class="event-min">${ev.minute!=null?ev.minute+"'":''}</div>
          <button class="icon-btn edit-only" data-del-event="${ev.id}">✕</button>
        </div>`;
      }).join('');
    }
    html += `<button class="add-event-btn edit-only" id="addEventBtn">+ Registrar evento</button>`;

    main.innerHTML = html;
    $('#backBtn').addEventListener('click', ()=>{ currentMatchId=null; render(); });
    const editRivalBtn = $('#editRivalCrestBtn');
    if(editRivalBtn) editRivalBtn.addEventListener('click', ()=>{ if(isEditor) openEditRivalCrestModal(m); });
    const deleteMatchBtn = $('#deleteMatchBtn');
    if(deleteMatchBtn) deleteMatchBtn.addEventListener('click', ()=>{
      if(!isEditor) return;
      openConfirmModal({
        title: 'Eliminar partido',
        message: `Vas a eliminar el partido vs ${escapeHtml(m.opponent)} (${formatDate(m.date)}). Se perderán su convocatoria, alineación, goles y estadísticas asociadas. Esta acción no se puede deshacer.`,
        confirmLabel: 'Eliminar definitivamente',
        danger: true,
        onConfirm: async ()=>{
          state.matches = state.matches.filter(x=>x.id!==m.id);
          await saveMatches();
          currentMatchId = null;
          render();
        }
      });
    });
    const waBtn = $('#waShareBtn');
    if(waBtn) waBtn.href = 'https://wa.me/?text=' + encodeURIComponent(buildWhatsAppText(m, called, titulares));
    const pdfBtn = $('#pdfBtn');
    if(pdfBtn) pdfBtn.addEventListener('click', ()=>{ if(isEditor) generateConvocatoriaPDF(m, called, titulares); });
    main.querySelectorAll('[data-toggle-call]').forEach(el=>{
      el.addEventListener('click', ()=>{
        if(!isEditor) return;
        const id = el.dataset.toggleCall;
        if(m.calledUp.includes(id)){
          m.calledUp = m.calledUp.filter(x=>x!==id);
          m.titulares = m.titulares.filter(x=>x!==id);
          m.lineupSlots = m.lineupSlots.map(pid=> pid===id ? null : pid);
        }
        else{ m.calledUp.push(id); }
        saveMatches(); render();
      });
    });
    main.querySelectorAll('[data-min-player]').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        if(!isEditor) return;
        if(!m.minutesPlayed) m.minutesPlayed = {};
        const v = inp.value.trim();
        m.minutesPlayed[inp.dataset.minPlayer] = v==='' ? null : Math.max(0, Math.min(130, parseInt(v)||0));
        saveMatches();
      });
    });
    main.querySelectorAll('[data-formation]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!isEditor) return;
        const key = btn.dataset.formation;
        if(key===m.formation) return;
        const applyChange = ()=>{
          m.formation = key;
          m.lineupSlots = new Array(FORMATIONS[key].slots.length).fill(null);
          m.titulares = [];
          saveMatches(); render();
        };
        const hasAssignments = m.lineupSlots.some(x=>x);
        if(hasAssignments){
          openConfirmModal({
            title: 'Cambiar formación',
            message: `Al cambiar a ${FORMATIONS[key].label} se vaciará la alineación actual y tendrás que volver a colocar a las jugadoras.`,
            confirmLabel: 'Cambiar formación',
            danger: false,
            onConfirm: async ()=> applyChange()
          });
        } else {
          applyChange();
        }
      });
    });
    main.querySelectorAll('[data-slot-idx]').forEach(sel=>{
      sel.addEventListener('change', ()=>{
        if(!isEditor) return;
        const idx = parseInt(sel.dataset.slotIdx);
        const val = sel.value || null;
        if(val){
          m.lineupSlots = m.lineupSlots.map(pid=> pid===val ? null : pid);
        }
        m.lineupSlots[idx] = val;
        m.titulares = m.lineupSlots.filter(Boolean);
        saveMatches(); render();
      });
    });
    const addEventBtn = $('#addEventBtn');
    if(addEventBtn) addEventBtn.addEventListener('click', ()=>{ if(isEditor) openEventModal(m); });
    main.querySelectorAll('[data-del-event]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!isEditor) return;
        m.events = m.events.filter(e=>e.id!==btn.dataset.delEvent);
        saveMatches(); render();
      });
    });
  }

  function buildWhatsAppText(m, called, titulares){
    const titIds = new Set(m.titulares);
    let txt = `📋 Convocatoria vs ${m.opponent}\n📅 ${formatDate(m.date)}\n\n`;
    txt += `Titulares:\n`;
    const tits = called.filter(p=>titIds.has(p.id));
    txt += (tits.length ? tits.map(p=>`⚽ ${p.name} (${p.number})`).join('\n') : '—') + '\n\n';
    const subs = called.filter(p=>!titIds.has(p.id));
    if(subs.length){
      txt += `Suplentes:\n` + subs.map(p=>`- ${p.name} (${p.number})`).join('\n') + '\n\n';
    }
    txt += `¡Nos vemos en el partido! ⚽`;
    return txt;
  }

  function generateConvocatoriaPDF(m, called, titulares){
    if(!window.jspdf){ return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const titIds = new Set(m.titulares);
    const teamName = teamNameInput.value || 'Mi Equipo';

    doc.setFillColor(19, 45, 36);
    doc.rect(0, 0, 210, 32, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.text(teamName, 14, 15);
    doc.setFontSize(12);
    doc.setFont('helvetica','normal');
    doc.text(`Convocatoria vs ${m.opponent}  ·  ${formatDate(m.date)}`, 14, 24);

    let y = 46;
    doc.setTextColor(20,20,20);
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.text('Titulares', 14, y);
    y += 8;
    doc.setFont('helvetica','normal');
    doc.setFontSize(11);
    const tits = called.filter(p=>titIds.has(p.id));
    if(tits.length===0){ doc.text('—', 16, y); y+=7; }
    tits.forEach(p=>{
      doc.text(`${p.number}  ${p.name}   (${positionsText(p)})`, 16, y);
      y += 7;
      if(y>270){ doc.addPage(); y=20; }
    });

    y += 6;
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.text('Suplentes', 14, y);
    y += 8;
    doc.setFont('helvetica','normal');
    doc.setFontSize(11);
    const subs = called.filter(p=>!titIds.has(p.id));
    if(subs.length===0){ doc.text('—', 16, y); y+=7; }
    subs.forEach(p=>{
      doc.text(`${p.number}  ${p.name}   (${positionsText(p)})`, 16, y);
      y += 7;
      if(y>270){ doc.addPage(); y=20; }
    });

    doc.setFontSize(9);
    doc.setTextColor(140,140,140);
    doc.text('Generado desde la app del equipo', 14, 290);

    doc.save(`convocatoria-${m.opponent.replace(/\s+/g,'_')}-${m.date}.pdf`);
  }

  function playersForSlotSorted(slot, called){
    return [...called].sort((a,b)=>{
      const score = p=>{
        if(p.positions && p.positions.includes(slot.code)) return 0;
        const cat = SUBPOS_META[slot.code] ? SUBPOS_META[slot.code].category : null;
        if(primaryCategory(p) === cat) return 1;
        return 2;
      };
      return score(a)-score(b) || a.name.localeCompare(b.name);
    });
  }

  function buildFormationPitch(m, called){
    const slots = FORMATIONS[m.formation].slots;
    let html = `<div class="pitch-wrap"><div class="formation-pitch">
      <svg class="pitch-svg" viewBox="0 0 300 320" preserveAspectRatio="none">
        <circle cx="150" cy="160" r="38" fill="none" stroke="rgba(241,245,238,0.35)" stroke-width="2"/>
        <line x1="10" y1="160" x2="290" y2="160" stroke="rgba(241,245,238,0.35)" stroke-width="2"/>
        <rect x="90" y="4" width="120" height="46" fill="none" stroke="rgba(241,245,238,0.35)" stroke-width="2"/>
        <rect x="90" y="270" width="120" height="46" fill="none" stroke="rgba(241,245,238,0.35)" stroke-width="2"/>
      </svg>`;
    html += slots.map((slot, idx)=>{
      const pid = m.lineupSlots[idx];
      const p = pid ? called.find(x=>x.id===pid) : null;
      if(p){
        return `<div class="slot-chip" style="left:${slot.x}%; top:${slot.top}%;">
          <div class="dot">${p.photo ? `<img src="${p.photo}"/>` : escapeHtml(p.number)}</div>
          <div class="cname">${escapeHtml(p.name.split(' ')[0])}</div>
        </div>`;
      }
      return `<div class="slot-chip empty" style="left:${slot.x}%; top:${slot.top}%;">
        <div class="dot">${slot.code}</div>
      </div>`;
    }).join('');
    html += `</div></div>`;
    return html;
  }

  function openEventModal(m){
    if(!isEditor) return;
    const called = state.players.filter(p=>m.calledUp.includes(p.id));
    let selType = 'goal';
    let setPiece = false;
    modalContent.innerHTML = `
      <h3>Registrar evento</h3>
      <div class="field"><label>Tipo</label>
        <div class="pos-choice" id="typeChoice">
          <button data-t="goal" class="sel">⚽ Gol propio</button>
          <button data-t="goal_against">🥅 Gol rival</button>
          <button data-t="assist">🅰 Asistencia</button>
          <button data-t="yellow">🟨 Amarilla</button>
          <button data-t="red">🟥 Roja</button>
        </div>
      </div>
      <div class="field" id="playerField"><label>Jugador</label>
        <select id="mPlayer">${called.map(p=>`<option value="${p.id}">${escapeHtml(p.name)} (${escapeHtml(p.number)})</option>`).join('')}</select>
      </div>
      <div class="field"><label>Minuto</label><input id="mMin" type="number" min="0" max="130" placeholder="Ej. 67" /></div>
      <div class="checkbox-field" id="spField"><div class="box" id="spBox"></div><span>Gol a balón parado (falta, córner, penalti…)</span></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelBtn">Cancelar</button>
        <button class="btn btn-primary" id="saveBtn">Guardar</button>
      </div>
    `;
    modalOverlay.classList.add('open');

    function updateFieldsVisibility(){
      $('#playerField').style.display = (selType==='goal_against') ? 'none' : 'block';
      $('#spField').style.display = (selType==='goal' || selType==='goal_against') ? 'flex' : 'none';
    }
    updateFieldsVisibility();

    modalContent.querySelectorAll('#typeChoice button').forEach(b=>{
      b.addEventListener('click', ()=>{
        modalContent.querySelectorAll('#typeChoice button').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel'); selType = b.dataset.t;
        updateFieldsVisibility();
      });
    });
    $('#spField').addEventListener('click', ()=>{ setPiece = !setPiece; $('#spBox').classList.toggle('on', setPiece); $('#spBox').textContent = setPiece?'✓':''; });
    $('#cancelBtn').addEventListener('click', closeModal);
    $('#saveBtn').addEventListener('click', ()=>{
      const minute = $('#mMin').value ? parseInt($('#mMin').value) : null;
      const playerId = (selType==='goal_against') ? null : ($('#mPlayer').value || null);
      if(selType!=='goal_against' && !playerId) return;
      const ev = { id: uid(), type: selType, minute };
      if(selType==='goal' || selType==='goal_against') ev.setPiece = setPiece;
      if(playerId) ev.playerId = playerId;
      m.events.push(ev);
      saveMatches();
      closeModal();
      render();
    });
  }

  /* ---------------- GALERÍA ---------------- */
  function renderGaleria(){
    if(currentMediaPlayerId){ renderPlayerMedia(currentMediaPlayerId); return; }
    if(state.players.length===0){
      main.innerHTML = `<div class="empty-state"><div class="big">🖼️</div><p>Añade jugadoras a la plantilla para poder compartir fotos y vídeos con cada una.</p></div>`;
      return;
    }
    let html = `<h2 class="section-title">Galería por jugadora</h2>`;
    html += state.players.map(p=>{
      const items = mediaByPlayer[p.id] || [];
      return `<div class="player-media-card" data-open-media="${p.id}">
        <div class="num-badge">${escapeHtml(p.number)}</div>
        <div class="player-info"><div class="player-name">${escapeHtml(p.name)}</div><div class="player-pos">${positionsText(p)}</div></div>
        <div class="media-count-badge">${items.length ? items.length + (items.length===1?' archivo':' archivos') : 'Sin contenido'}</div>
      </div>`;
    }).join('');
    main.innerHTML = html;
    main.querySelectorAll('[data-open-media]').forEach(el=>{
      el.addEventListener('click', ()=>{ currentMediaPlayerId = el.dataset.openMedia; render(); });
    });
  }

  function renderPlayerMedia(playerId){
    const p = state.players.find(x=>x.id===playerId);
    if(!p){ currentMediaPlayerId=null; render(); return; }
    const items = [...(mediaByPlayer[p.id] || [])].sort((a,b)=> b.createdAt - a.createdAt);
    let html = `<div class="back-row">
      <button id="backBtn">←</button>
      <div><div class="vs-title">${escapeHtml(p.name)}</div><div class="date-sub">${positionsText(p)} · Dorsal ${escapeHtml(p.number)}</div></div>
    </div>`;
    if(items.length===0){
      html += `<div class="empty-state" style="padding:26px 10px;"><div class="big">📷</div><p>Todavía no hay fotos ni vídeos compartidos con ${escapeHtml(p.name.split(' ')[0])}.</p></div>`;
    } else {
      html += `<div class="media-grid">` + items.map(it=>{
        if(it.type==='photo'){

  function renderPlayerStats(body){
    if(state.players.length===0){ body.innerHTML = `<div class="empty-state"><p>Añade jugadores para ver sus estadísticas.</p></div>`; return; }
    const tally = {};
    state.players.forEach(p=> tally[p.id] = { goals:0, assists:0, yellow:0, red:0, minutes:0 });
    state.matches.forEach(m=> m.events.forEach(ev=>{
      if(!ev.playerId || !tally[ev.playerId]) return;
      if(ev.type==='goal') tally[ev.playerId].goals++;
      else if(ev.type==='assist') tally[ev.playerId].assists++;
      else if(ev.type==='yellow') tally[ev.playerId].yellow++;
      else if(ev.type==='red') tally[ev.playerId].red++;
    }));
    state.matches.forEach(m=>{
      if(!m.minutesPlayed) return;
      Object.entries(m.minutesPlayed).forEach(([pid, mins])=>{
        if(tally[pid] && mins!=null) tally[pid].minutes += mins;
      });
    });
    const rows = state.players.map(p=>({ p, t: tally[p.id] })).sort((a,b)=> b.t.goals - a.t.goals || b.t.assists - a.t.assists);
    let html = `<h2 class="section-title">Clasificación de jugadores</h2>
      <table class="stats-table"><thead><tr><th>Jugador</th><th>PJ</th><th>Min</th><th>⚽</th><th>🅰</th><th>🟨</th><th>🟥</th></tr></thead><tbody>`;
    html += rows.map((r,i)=>{
      const pj = state.matches.filter(m=>m.calledUp.includes(r.p.id)).length;
      return `<tr><td><span class="rank-badge ${i===0 && r.t.goals>0 ? 'gold':''}">${i+1}</span>${escapeHtml(r.p.name)}</td>
        <td>${pj}</td><td>${r.t.minutes}</td><td>${r.t.goals}</td><td>${r.t.assists}</td><td>${r.t.yellow}</td><td>${r.t.red}</td></tr>`;
    }).join('');
    html += `</tbody></table>`;
    body.innerHTML = html;
  }

  function renderMatchesOverview(body){

    const sorted = [...state.matches].sort((a,b)=> b.date.localeCompare(a.date));
    let wins=0, draws=0, losses=0;
    let html = sorted.map(m=>{
      const {gf,gc} = matchScore(m);
      const res = matchResult(gf,gc);

      const yellows = m.events.filter(e=>e.type==='yellow').length;
      const reds = m.events.filter(e=>e.type==='red').length;
      return `<div class="match-card" data-goto="${m.id}">
        ${rivalCrestHtml(m)}
        <div class="score-badge">${gf}-${gc}</div>
        <div class="info">
          <div class="vs">vs ${escapeHtml(m.opponent)} <span class="result-tag ${res}">${RESULT_LABEL[res]}</span></div>
          <div class="date">${formatDate(m.date)}</div>

  function bucketFor(minute){
    if(minute==null) return null;
    if(minute<=15) return '0-15';
    if(minute<=30) return '16-30';
    if(minute<=45) return '31-45';
    if(minute<=60) return '46-60';
    if(minute<=75) return '61-75';
    return '76-90+';
  }

  function renderGlobalStats(body){
    if(state.matches.length===0){ body.innerHTML = `<div class="empty-state"><p>Registra partidos para ver las estadísticas globales.</p></div>`; return; }

    // Rival aggregation
    const rivals = {};
    state.matches.forEach(m=>{
      const {gf,gc} = matchScore(m);
      if(!rivals[m.opponent]) rivals[m.opponent] = { pj:0, gf:0, gc:0 };
      rivals[m.opponent].pj++;
      rivals[m.opponent].gf += gf;
      rivals[m.opponent].gc += gc;
    });
    const rivalRows = Object.entries(rivals).sort((a,b)=> a[0].localeCompare(b[0]));

    // Minute buckets
    const bucketFavor = {}; const bucketContra = {};
    BUCKETS.forEach(b=>{ bucketFavor[b]=0; bucketContra[b]=0; });
    let favorNoMin = 0, contraNoMin = 0;
    let spFavor = 0, spContra = 0, openFavor = 0, openContra = 0;
    state.matches.forEach(m=> m.events.forEach(ev=>{
      if(ev.type==='goal'){
        const b = bucketFor(ev.minute);
        if(b) bucketFavor[b]++; else favorNoMin++;
        if(ev.setPiece) spFavor++; else openFavor++;
      } else if(ev.type==='goal_against'){
        const b = bucketFor(ev.minute);
        if(b) bucketContra[b]++; else contraNoMin++;
        if(ev.setPiece) spContra++; else openContra++;
      }
    }));
    const maxBucket = Math.max(1, ...BUCKETS.map(b=> Math.max(bucketFavor[b], bucketContra[b])));

    let html = `<h2 class="section-title">Goles según el rival</h2>`;
    html += rivalRows.map(([name, r])=>{
      const bal = r.gf - r.gc;
      return `<div class="rival-row">
        <div><div class="name">${escapeHtml(name)}</div><div class="sub">${r.pj} partido${r.pj!==1?'s':''}</div></div>
        <div class="nums">${r.gf} - ${r.gc}<div class="bal">${bal>0?'+':''}${bal}</div></div>
      </div>`;
    }).join('');

    html += `<h2 class="section-title">Goles por minuto (favor / rival)</h2>
      <div class="bucket-legend"><span><i class="legend-dot favor"></i>A favor</span><span><i class="legend-dot contra"></i>En contra</span></div>`;
    html += BUCKETS.map(b=>{
      const wf = Math.round((bucketFavor[b]/maxBucket)*100);
      const wc = Math.round((bucketContra[b]/maxBucket)*100);
      return `<div class="bucket-row">
        <div class="bucket-label">${b}'</div>
        <div class="bucket-bars">
          <div class="bucket-bar-track"><div class="bucket-bar-fill favor" style="width:${wf}%;"></div></div>
          <div class="bucket-bar-track"><div class="bucket-bar-fill contra" style="width:${wc}%;"></div></div>
        </div>
        <div class="bucket-count">${bucketFavor[b]}/${bucketContra[b]}</div>
      </div>`;
    }).join('');
    if(favorNoMin || contraNoMin){
      html += `<p style="font-size:11px; color:var(--text-dim); margin-top:-2px;">Sin minuto registrado: ${favorNoMin} a favor, ${contraNoMin} en contra.</p>`;
    }

    html += `<h2 class="section-title">Goles a balón parado</h2>
      <div class="stat-grid">
        <div class="stat-box"><div class="l">Balón parado a favor</div><div class="v gold">${spFavor}</div></div>
        <div class="stat-box"><div class="l">Balón parado en contra</div><div class="v red">${spContra}</div></div>
        <div class="stat-box"><div class="l">Jugada abierta a favor</div><div class="v">${openFavor}</div></div>
        <div class="stat-box"><div class="l">Jugada abierta en contra</div><div class="v">${openContra}</div></div>
      </div>
    `;
    body.innerHTML = html;
  }

  initAuth();
})();
</script>
</body>
</html>
